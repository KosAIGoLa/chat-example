services:
  nats:
    image: nats:2.14.3-alpine
    # JetStream (NATS Streaming 的官方替代): -js 开启, -sd 持久化目录, -m 监控端口
    command:
      - "-js"
      - "-sd"
      - "/data"
      - "-m"
      - "8222"
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring (/jsz, /healthz, /varz)
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chatpass
      POSTGRES_DB: chatdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chatdb"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # LiveKit SFU — WebRTC media for private calls & group meetings.
  # Signaling: browser → :3000/rtc (nginx) → livekit:7880  (do NOT open :7880 in browser)
  # Media: UDP 50000–50100 + TCP 7881 published on the host for ICE.
  #
  # LIVEKIT_NODE_IP = ICE address browsers must reach (NOT docker 172.x, NOT broken WAN).
  #   localhost UI  → 127.0.0.1
  #   LAN UI        → host LAN IP (e.g. 192.168.1.102)
  livekit:
    image: livekit/livekit-server:latest
    command:
      - --config
      - /etc/livekit.yaml
      - --node-ip
      - ${LIVEKIT_NODE_IP:-127.0.0.1}
    ports:
      - "7880:7880"       # HTTP / WebSocket signaling (debug)
      - "7881:7881"       # RTC over TCP fallback
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped
    healthcheck:
      # Server exposes / on 7880; any HTTP response means process is up.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:7880"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Go WebSocket chat backend (see ./chat-service)
  ws-server:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_ADDR=:8080
      - NATS_URL=nats://nats:4222
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=chat
      - DB_PASSWORD=chatpass
      - DB_NAME=chatdb
      - JWT_SECRET=4e2d5fb9300d10a7d21d2fdb1e4d813fb9d55dff75d7a2c9d8b13ec61a99f3e0f26cb6d92efc5e5b29c4f0fcd54cfe758d49893c5d97a5d1d87d88bb6d6b8d42
      - MSG_CRYPTO_KEY=4YvS3j8M4wq2w2sQJv8S3JxQq7Q9iW4xQ6v9bW8H7nA
      - MEDIA_DIR=/app/data/voice
      # LiveKit — API key/secret must match livekit.yaml `keys`
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret_livekit_dev_change_me_32chars!!
      # auto = same origin as page (ws://host:3000), nginx proxies /rtc → livekit:7880
      - LIVEKIT_URL=auto
    volumes:
      - voice-data:/app/data/voice
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started
    restart: unless-stopped

  # SvelteKit static frontend + nginx reverse proxy
  # UI: http://localhost:3000
  # Proxies /api/* and /ws → ws-server
  frontend:
    build:
      context: ./front-chat
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - ws-server
      - livekit
    restart: unless-stopped

volumes:
  pgdata:
  nats-data:
  voice-data:

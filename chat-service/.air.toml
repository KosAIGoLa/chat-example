# Hot reload for local development (https://github.com/air-verse/air)
#   make dev
#   or: go run github.com/air-verse/air@v1.61.7 -c .air.toml

root = "."
tmp_dir = "tmp"

[build]
  # Build the server binary into tmp/ for quick restart.
  cmd = "go build -o ./tmp/ws-server ./cmd/server"
  bin = "./tmp/ws-server"
  full_bin = ""
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "vendor", "data", "testdata", "node_modules"]
  exclude_file = []
  exclude_regex = ["_test\\.go"]
  exclude_unchanged = true
  follow_symlink = false
  delay = 400
  stop_on_error = true
  send_interrupt = true
  kill_delay = "500ms"
  rerun = false
  rerun_delay = 500

[log]
  time = true
  main_only = false
  silent = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
  keep_scroll = true

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — resolve upstream at request time so nginx can start
    # even when ws-server is briefly unavailable (restart loop, deploy, etc.)
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend "ws-server:8080";

    # Auth & REST API → Go backend
    # e.g. POST /api/auth/register, POST /api/auth/login, GET /api/users/online
    # Voice uploads can be up to ~5MB.
    client_max_body_size 6m;

    location /api/ {
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        client_max_body_size 6m;
    }

    # WebSocket → Go backend
    location /ws {
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Hashed build assets: never fall back to index.html (that breaks JS parse)
    location /_app/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA shell — always revalidate so deploys pick up new asset hashes
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback (SvelteKit adapter-static)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — resolve upstream at request time so nginx can start
    # even when ws-server / livekit are briefly unavailable.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend "ws-server:8080";
    set $livekit "livekit:7880";

    # Auth & REST API → Go backend
    client_max_body_size 6m;

    location /api/ {
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        # $http_host keeps port (localhost:3000); $host strips it → broken LiveKit URL.
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        client_max_body_size 6m;
    }

    # Chat WebSocket → Go backend
    location /ws {
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ------------------------------------------------------------------
    # LiveKit signaling (WebSocket) — same host/port as the SPA (:3000).
    # Browser connects to:  ws(s)://{page-host}/rtc  or  /rtc/v1?...
    # nginx forwards to:    livekit:7880/rtc[...]
    # Media (UDP 50000-50100 + TCP 7881) still goes directly to the host.
    # ------------------------------------------------------------------
    location /rtc {
        proxy_pass http://$livekit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Keep client Host (with port) for any absolute-URL generation.
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
    }

    # LiveKit HTTP APIs used by some client/server features
    location /twirp {
        proxy_pass http://$livekit;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed build assets: never fall back to index.html (that breaks JS parse)
    location /_app/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA shell — always revalidate so deploys pick up new asset hashes
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback (SvelteKit adapter-static)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

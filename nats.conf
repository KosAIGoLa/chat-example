# NATS server — JetStream enabled (chat history + presence KV).
# Mounted read-only into the nats container by docker-compose.

server_name: ws-ex-nats
port: 4222
http_port: 8222
max_payload: 2MB

# Enable JetStream explicitly (equivalent to -js, with hard resource caps).
jetstream {
  store_dir: /data
  # Must be ≥ any stream MaxBytes (legacy CHAT_MESSAGES may still reserve 8GiB until updated).
  max_file_store: 10GB
  max_memory_store: 512MB
}
